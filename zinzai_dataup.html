<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>書類アップロード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&family=Noto+Sans:wght@400;600&family=Noto+Sans+KR:wght@400;600&family=Noto+Sans+SC:wght@400;600&family=Noto+Sans+Thai:wght@400;600&family=Noto+Sans+Myanmar:wght@400;600&family=Noto+Serif+Khmer:wght@400;600&display=swap');
  :root {
    --primary: #1a56db;
    --primary-dark: #1341a8;
    --success: #057a55;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --error: #9b1c1c;
    --error-bg: #fef2f2;
    --error-border: #fecaca;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a202c;
    --sub: #718096;
    --border: #e2e8f0;
    --hover: #eff6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans', 'Noto Sans JP', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 60px;
  }
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 20px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .lang-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
    justify-content: center;
  }
  .lang-btn {
    padding: 5px 10px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    background: #fff;
    color: var(--sub);
    transition: all 0.15s;
    font-family: inherit;
  }
  .lang-btn.active {
    background: var(--primary);
    border-color: var(--primary);
    color: #fff;
    font-weight: 600;
  }
  .header { text-align: center; margin-bottom: 28px; }
  .office-name { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .page-icon { font-size: 36px; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--sub); line-height: 1.7; white-space: pre-line; }
  .fields-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .field-row {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .field-row.has-file { border-color: var(--primary); background: #eff6ff; }
  .field-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }
  .field-label { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .field-status { font-size: 12px; color: var(--sub); white-space: nowrap; }
  .field-status.ready { color: var(--success); font-weight: 600; }
  .chevron { font-size: 11px; color: var(--sub); transition: transform 0.2s; flex-shrink: 0; }
  .field-row.open .chevron { transform: rotate(180deg); }
  .field-body {
    border-top: 1.5px solid var(--border);
    padding: 12px 14px;
    display: none;
  }
  .field-row.open .field-body { display: block; }
  .field-row.has-file .field-body { border-top-color: var(--primary); }
  .mini-drop {
    border: 2px dashed #c0cfe0;
    border-radius: 10px;
    padding: 20px 12px;
    text-align: center;
    cursor: pointer;
    position: relative;
    background: #f8fafc;
    transition: all 0.2s;
  }
  .mini-drop:hover { border-color: var(--primary); background: var(--hover); }
  .mini-drop input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .mini-drop-text { font-size: 13px; color: #4a5568; font-weight: 600; }
  .mini-drop-hint { font-size: 11px; color: #a0aec0; margin-top: 3px; }
  .preview-wrap { position: relative; display: block; }
  .preview-wrap img {
    width: 100%;
    max-height: 180px;
    object-fit: contain;
    border-radius: 8px;
    background: #eee;
    display: block;
  }
  .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 26px;
    height: 26px;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-submit {
    display: block;
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-submit:hover:not(:disabled) { background: var(--primary-dark); }
  .btn-submit:disabled { background: #93c5fd; cursor: not-allowed; }
  .progress-bar-wrap {
    display: none;
    margin-top: 14px;
    background: #e2e8f0;
    border-radius: 8px;
    overflow: hidden;
    height: 8px;
  }
  .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.4s; }
  .status-msg {
    display: none;
    margin-top: 18px;
    padding: 16px;
    border-radius: 12px;
    font-size: 14px;
    text-align: center;
    line-height: 1.7;
    white-space: pre-line;
  }
  .status-msg.success { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .status-msg.error { background: var(--error-bg); color: var(--error); border: 1px solid var(--error-border); }
</style>

<div class="card">

    msgSuccess:'✅ උඩුගත කිරීම සාර්ථකයි!\nඔබේ ලේඛන ලැබී ඇත.',
    msgError:'❌ උඩුගත කිරීම අසාර්ථකයි.\nනැවත උත්සාහ කරන්න.',
    msgNoFile:'අවම වශයෙන් ඡායාරූපයක් තෝරන්න',
    docs:{ zairyu_front:'පදිංචිකාර්ඩ් (ඉදිරිපස)', zairyu_back:'පදිංචිකාර්ඩ් (පිටුපස)', passport:'ගමන් බලපත්‍රය', cert_jp:'සහතිකය (ජපන් භාෂාව)', cert_skill:'සහතිකය (කුසලතා විභාගය)', cert_specialist:'සහතිකය (විශේෂඥ/මට්ටම 3)', tax_payment:'බදු ගෙවීමේ සහතිකය', tax_cert:'බදු සහතිකය', withholding:'රඳවා ගත් බදු ප්‍රකාශය', medical:'වෛද්‍ය සහතිකය', other:'වෙනත්' }
  },
  ko: {
    label:'한국어', title:'서류 업로드',
    subtitle:'필요한 서류의 사진을 업로드해 주세요\n(불필요한 항목은 건너뛸 수 있습니다)',
    tapToAdd:'📷 탭하여 사진 추가', hint:'JPG / PNG / PDF', btnSubmit:'제출',
    noFile:'미선택', selected:'선택됨 ✓',
    msgSuccess:'✅ 업로드 완료!\n담당자에게 전달되었습니다.',
    msgError:'❌ 업로드 실패.\n다시 시도해 주세요.',
    msgNoFile:'사진을 최소 한 장 선택해 주세요',
    docs:{ zairyu_front:'재류카드 (앞면)', zairyu_back:'재류카드 (뒷면)', passport:'여권', cert_jp:'합격증 (일본어)', cert_skill:'합격증 (기능시험)', cert_specialist:'합격증 (전문급·3급)', tax_payment:'납세증명서', tax_cert:'과세증명서', withholding:'원천징수영수증', medical:'건강진단서', other:'기타' }
  },
  ne: {
    label:'नेपाली', title:'कागजात अपलोड',
    subtitle:'आवश्यक कागजातको फोटो अपलोड गर्नुहोस्\n(अनावश्यक वस्तुहरू छोड्न सकिन्छ)',
    tapToAdd:'📷 फोटो थप्न थिच्नुहोस्', hint:'JPG / PNG / PDF', btnSubmit:'पेश गर्नुहोस्',
    noFile:'छनोट गरिएको छैन', selected:'छनोट भयो ✓',
    msgSuccess:'✅ अपलोड सफल भयो!\nतपाईंको कागजात प्राप्त भयो।',
    msgError:'❌ अपलोड असफल भयो।\nपुनः प्रयास गर्नुहोस्।',
    msgNoFile:'कम्तीमा एउटा फोटो छनोट गर्नुहोस्',
    docs:{ zairyu_front:'आवास कार्ड (अगाडि)', zairyu_back:'आवास कार्ड (पछाडि)', passport:'राहदानी', cert_jp:'प्रमाणपत्र (जापानी भाषा)', cert_skill:'प्रमाणपत्र (सीप परीक्षण)', cert_specialist:'प्रमाणपत्र (विशेषज्ञ/स्तर ३)', tax_payment:'कर तिरेको प्रमाणपत्र', tax_cert:'कर प्रमाणपत्र', withholding:'स्रोतमा कर कटौती विवरण', medical:'स्वास्थ्य परीक्षण प्रमाणपत्र', other:'अन्य' }
  },

const LANG_ORDER = ['ja','en','mn','zh','km','vi','id','th','my','si','ko','ne'];
let currentLang = 'ja';
const fileData = {};

const langBar = document.getElementById('langBar');
const fieldsList = document.getElementById('fieldsList');
const submitBtn = document.getElementById('submitBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const statusMsg = document.getElementById('statusMsg');

LANG_ORDER.forEach(code => {
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (code === 'ja' ? ' active' : '');
  btn.textContent = LANGS[code].label;
  btn.addEventListener('click', () => setLang(code));
  langBar.appendChild(btn);
});

function buildFields() {
  const L = LANGS[currentLang];
  fieldsList.innerHTML = '';
  let firstEmptyOpened = false;

  DOC_KEYS.forEach(key => {
    const hasFiles = fileData[key] && fileData[key].length > 0;
    const row = document.createElement('div');
    row.className = 'field-row' + (hasFiles ? ' has-file' : '');
    row.dataset.key = key;

    // Header
    const header = document.createElement('div');
    header.className = 'field-header';

    const label = document.createElement('span');
    label.className = 'field-label';
    label.textContent = L.docs[key];

    const status = document.createElement('span');
    status.className = 'field-status' + (hasFiles ? ' ready' : '');
    status.textContent = hasFiles ? L.selected : L.noFile;

    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '▼';

    header.appendChild(label);
    header.appendChild(status);
    header.appendChild(chevron);
    header.addEventListener('click', () => row.classList.toggle('open'));

    // Body
    const body = document.createElement('div');
    body.className = 'field-body';

    if (hasFiles) {
      fileData[key].forEach((fd, fi) => {
        const previewWrap = document.createElement('div');
        previewWrap.className = 'preview-wrap';
        if (fd.isPdf) {
          const pdfIcon = document.createElement('div');
          pdfIcon.style.cssText = 'padding:12px;background:#fef2f2;border-radius:8px;text-align:center;font-size:13px;color:#dc2626;font-weight:600;';
          pdfIcon.textContent = '📄 ' + fd.name;
          previewWrap.appendChild(pdfIcon);
        } else {
          const img = document.createElement('img');
          img.src = fd.dataUrl;
          previewWrap.appendChild(img);
        }
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '×';
        removeBtn.addEventListener('click', () => {
          fileData[key].splice(fi, 1);
          if (fileData[key].length === 0) delete fileData[key];
          buildFields();
          updateSubmitBtn();
        });
        previewWrap.appendChild(removeBtn);
        body.appendChild(previewWrap);
      });
      // 追加ボタン
      const addMore = document.createElement('div');
      addMore.className = 'mini-drop';
      addMore.style.cssText = 'margin-top:4px;';
      const addInput = document.createElement('input');
      addInput.type = 'file';
      addInput.accept = 'image/*,application/pdf';
      addInput.multiple = true;
      addInput.addEventListener('change', e => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        if (!fileData[key]) fileData[key] = [];
        let loaded = 0;
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => {
            fileData[key].push({ dataUrl: ev.target.result, name: file.name, mimeType: file.type, base64: ev.target.result.split(',')[1], isPdf: file.type === 'application/pdf' });
            loaded++;
            if (loaded === files.length) { buildFields(); updateSubmitBtn(); }
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      });
      const addText = document.createElement('div');
      addText.className = 'mini-drop-text';
      addText.textContent = '➕ 追加';
      addMore.appendChild(addInput);
      addMore.appendChild(addText);
      body.appendChild(addMore);
    } else {
      const mini = document.createElement('div');
      mini.className = 'mini-drop';

      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*,application/pdf';
      input.multiple = true;
      input.addEventListener('change', e => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        if (!fileData[key]) fileData[key] = [];
        let loaded = 0;
        files.forEach(file => {
          const reader = new FileReader();
          reader.onload = ev => {
            fileData[key].push({
              dataUrl: ev.target.result,
              name: file.name,
              mimeType: file.type,
              base64: ev.target.result.split(',')[1],
              isPdf: file.type === 'application/pdf',
            });
            loaded++;
            if (loaded === files.length) {
              buildFields();
              updateSubmitBtn();
              // Open next empty field
              const idx = DOC_KEYS.indexOf(key);
              const nextKey = DOC_KEYS.slice(idx + 1).find(k => !fileData[k] || !fileData[k].length);
              if (nextKey) {
                const nextRow = fieldsList.querySelector('[data-key="' + nextKey + '"]');
                if (nextRow) nextRow.classList.add('open');
              }
            }
          };
          reader.readAsDataURL(file);
        });
        e.target.value = '';
      });

      const dropText = document.createElement('div');
      dropText.className = 'mini-drop-text';
      dropText.textContent = L.tapToAdd;

      const dropHint = document.createElement('div');
      dropHint.className = 'mini-drop-hint';
      dropHint.textContent = L.hint;

      mini.appendChild(input);
      mini.appendChild(dropText);
      mini.appendChild(dropHint);
      body.appendChild(mini);

      // Open first empty
      if (!firstEmptyOpened) {
        row.classList.add('open');
        firstEmptyOpened = true;
      }
    }

    row.appendChild(header);
    row.appendChild(body);
    fieldsList.appendChild(row);
  });
}

function updateSubmitBtn() {
  const L = LANGS[currentLang];
  submitBtn.textContent = L.btnSubmit;
  submitBtn.disabled = Object.keys(fileData).filter(k => fileData[k] && fileData[k].length > 0).length === 0;
}

function setLang(code) {
  currentLang = code;
  const L = LANGS[code];
  langBar.querySelectorAll('.lang-btn').forEach((b, i) => {
    b.classList.toggle('active', LANG_ORDER[i] === code);
  });
  document.getElementById('ttlMain').textContent = L.title;
  document.getElementById('ttlSub').textContent = L.subtitle;
  buildFields();
  updateSubmitBtn();
}

setLang('ja');

submitBtn.addEventListener('click', async () => {
  const L = LANGS[currentLang];
  const keys = Object.keys(fileData).filter(k => fileData[k] && fileData[k].length > 0);
  if (keys.length === 0) { alert(L.msgNoFile); return; }

  submitBtn.disabled = true;
  progressWrap.style.display = 'block';
  progressBar.style.width = '10%';
  statusMsg.style.display = 'none';

  const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filesPayload = [];
  keys.forEach(key => {
    const arr = fileData[key] || [];
    const docLabel = LANGS['ja'].docs[key];
    arr.forEach((d, i) => {
      const ext = d.name.split('.').pop() || 'jpg';
      const suffix = arr.length > 1 ? '_' + (i + 1) : '';
      filesPayload.push({ name: docLabel + suffix + '_' + timestamp + '.' + ext, mimeType: d.mimeType, data: d.base64 });
    });
  });

  try {
    progressBar.style.width = '40%';
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ files: filesPayload, folderId: FOLDER_ID }),
    });
    progressBar.style.width = '90%';
    const json = await res.json();
    if (json.success) {
      progressBar.style.width = '100%';
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = L.msgSuccess;
      statusMsg.style.display = 'block';
      // Supabaseに通知を保存
      if (CASE_ID) {
        try {
          await fetch('https://ehwlgbwpycglmopiqyty.supabase.co/rest/v1/upload_notifications', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'apikey': 'sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u',
              'Authorization': 'Bearer sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({
              case_id: CASE_ID,
              folder_id: FOLDER_ID,
              file_count: filesPayload.length,
              file_names: filesPayload.map(f => f.name).join(', '),
              source: 'zinzai_dataup'
            })
          });
        } catch(e) { console.warn('通知保存失敗:', e); }
      }
      DOC_KEYS.forEach(k => delete fileData[k]);
      buildFields();
      updateSubmitBtn();
    } else {
      throw new Error(json.error || 'error');
    }
  } catch (err) {
    statusMsg.className = 'status-msg error';
    statusMsg.textContent = L.msgError;
    statusMsg.style.display = 'block';
    submitBtn.disabled = false;
  }

  setTimeout(() => {
    progressWrap.style.display = 'none';
    progressBar.style.width = '0%';
  }, 1200);
});
</script>
