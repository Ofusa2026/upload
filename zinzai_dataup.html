<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>書類アップロード</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600&family=Noto+Sans:wght@400;600&display=swap');
  :root{--primary:#1a56db;--primary-dark:#1341a8;--success:#057a55;--success-bg:#f0fdf4;--success-border:#bbf7d0;--error:#9b1c1c;--error-bg:#fef2f2;--error-border:#fecaca;--bg:#f0f4f8;--card:#ffffff;--text:#1a202c;--sub:#718096;--border:#e2e8f0;--hover:#eff6ff;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans','Noto Sans JP',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:20px 16px 60px;}
  .card{background:var(--card);border-radius:20px;padding:28px 20px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
  .lang-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px;justify-content:center;}
  .lang-btn{padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;cursor:pointer;background:#fff;color:var(--sub);transition:all 0.15s;font-family:inherit;}
  .lang-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;font-weight:600;}
  .header{text-align:center;margin-bottom:28px;}
  .office-name{font-size:12px;color:var(--sub);margin-bottom:8px;}
  .page-icon{font-size:36px;margin-bottom:8px;}
  h1{font-size:20px;font-weight:600;color:var(--text);margin-bottom:6px;}
  .subtitle{font-size:13px;color:var(--sub);line-height:1.7;white-space:pre-line;}
  .fields-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px;}
  .field-row{border:1.5px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color 0.2s;}
  .field-row.has-file{border-color:var(--primary);background:#eff6ff;}
  .field-header{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer;user-select:none;gap:8px;}
  .field-label{font-size:14px;font-weight:600;color:var(--text);flex:1;}
  .field-status{font-size:12px;color:var(--sub);white-space:nowrap;}
  .field-status.ready{color:var(--success);font-weight:600;}
  .chevron{font-size:11px;color:var(--sub);transition:transform 0.2s;flex-shrink:0;}
  .field-row.open .chevron{transform:rotate(180deg);}
  .field-body{border-top:1.5px solid var(--border);padding:12px 14px;display:none;}
  .field-row.open .field-body{display:block;}
  .field-row.has-file .field-body{border-top-color:var(--primary);}
  .mini-drop{border:2px dashed #c0cfe0;border-radius:10px;padding:20px 12px;text-align:center;cursor:pointer;position:relative;background:#f8fafc;transition:all 0.2s;}
  .mini-drop:hover{border-color:var(--primary);background:var(--hover);}
  .mini-drop input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .mini-drop-text{font-size:13px;color:#4a5568;font-weight:600;}
  .mini-drop-hint{font-size:11px;color:#a0aec0;margin-top:3px;}
  .preview-wrap{position:relative;display:block;}
  .preview-wrap img{width:100%;max-height:180px;object-fit:contain;border-radius:8px;background:#eee;display:block;}
  .remove-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.65);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .btn-submit{display:block;width:100%;padding:16px;background:var(--primary);color:#fff;font-family:inherit;font-size:16px;font-weight:600;border:none;border-radius:12px;cursor:pointer;transition:background 0.2s;}
  .btn-submit:hover:not(:disabled){background:var(--primary-dark);}
  .btn-submit:disabled{background:#93c5fd;cursor:not-allowed;}
  .progress-bar-wrap{display:none;margin-top:14px;background:#e2e8f0;border-radius:8px;overflow:hidden;height:8px;}
  .progress-bar{height:100%;background:var(--primary);width:0%;transition:width 0.4s;}
  .status-msg{display:none;margin-top:18px;padding:16px;border-radius:12px;font-size:14px;text-align:center;line-height:1.7;white-space:pre-line;}
  .status-msg.success{background:var(--success-bg);color:var(--success);border:1px solid var(--success-border);}
  .status-msg.error{background:var(--error-bg);color:var(--error);border:1px solid var(--error-border);}
</style>
</head>
<body>
<div style="position:fixed;top:6px;left:8px;font-size:9px;color:rgba(0,0,0,.3);z-index:9999;pointer-events:none;" id="verBadge"></div>

  <div class="lang-bar" id="langBar"></div>

  if (!SKIP_DOCS.length || !doc.tags.length) return false;

}
function getDocPattern() {

  return Object.fromEntries(ALL_DOCS.map(d => [d.key,'optional']));

function getRequiredTags() {

}
function getDocKeys() {
  const required = getRequiredTags();
  const pattern = APP_TYPE ? getDocPattern() : null;
  if (!required) return ALL_DOCS.filter(doc => !isDocSkipped(doc)).map(d => d.key);
  return ALL_DOCS.filter(doc => {
    if (doc.key === 'other') return true;
    if (!doc.tags.length) return false;

    if (pattern && pattern[doc.key] === 'optional') return true;

    return doc.tags.some(tag => required.some(r => r.indexOf(tag) >= 0 || tag.indexOf(r) >= 0));

};
const LANG_ORDER = ['ja','en','vi','id','my','ko','ne','zh','th','km','mn','si'];
let currentLang = 'ja';
const fileData = {};
const langBar = document.getElementById('langBar');
const fieldsList = document.getElementById('fieldsList');
const submitBtn = document.getElementById('submitBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const statusMsg = document.getElementById('statusMsg');

LANG_ORDER.forEach(code => {
  if (!LANGS[code]) return;
  const btn = document.createElement('button');
  btn.className = 'lang-btn' + (code === 'ja' ? ' active' : '');
  btn.textContent = LANGS[code].label;
  btn.addEventListener('click', () => setLang(code));
  langBar.appendChild(btn);
});

function buildFields() {
  const L = LANGS[currentLang];
  fieldsList.innerHTML = '';
  let firstEmptyOpened = false;
  const pattern = APP_TYPE ? getDocPattern() : null;
  DOC_KEYS.forEach(key => {
    const hasFiles = fileData[key] && fileData[key].length > 0;
    const isRequired = pattern && pattern[key] === 'required';
    const row = document.createElement('div');
    row.className = 'field-row' + (hasFiles ? ' has-file' : '');
    row.dataset.key = key;
    const header = document.createElement('div');
    header.className = 'field-header';
    const label = document.createElement('span');
    label.className = 'field-label';
    const labelText = (L.docs && L.docs[key]) || key;
    if (isRequired) { label.innerHTML = '<span style="color:#dc2626;font-size:11px;margin-right:3px;">必須</span>' + labelText; }
    else { label.textContent = labelText; }
    const status = document.createElement('span');
    status.className = 'field-status' + (hasFiles ? ' ready' : '');
    status.textContent = hasFiles ? L.selected : L.noFile;
    const chevron = document.createElement('span');
    chevron.className = 'chevron';
    chevron.textContent = '▼';
    header.appendChild(label); header.appendChild(status); header.appendChild(chevron);
    header.addEventListener('click', () => row.classList.toggle('open'));
    const body = document.createElement('div');
    body.className = 'field-body';
    if (hasFiles) {
      fileData[key].forEach((fd, fi) => {
        const pw = document.createElement('div');
        pw.className = 'preview-wrap';
        if (fd.isPdf) { const pi = document.createElement('div'); pi.style.cssText='padding:12px;background:#fef2f2;border-radius:8px;text-align:center;font-size:13px;color:#dc2626;font-weight:600;'; pi.textContent='📄 '+fd.name; pw.appendChild(pi); }
        else { const img = document.createElement('img'); img.src = fd.dataUrl; pw.appendChild(img); }
        const rb = document.createElement('button'); rb.className='remove-btn'; rb.textContent='×';
        rb.addEventListener('click', () => { fileData[key].splice(fi,1); if(!fileData[key].length) delete fileData[key]; buildFields(); updateSubmitBtn(); });
        pw.appendChild(rb); body.appendChild(pw);
      });
      const am = document.createElement('div'); am.className='mini-drop'; am.style.cssText='margin-top:4px;';
      const ai = document.createElement('input'); ai.type='file'; ai.accept='image/*,application/pdf'; ai.multiple=true;
      ai.addEventListener('change', e => { const files=Array.from(e.target.files); if(!files.length) return; if(!fileData[key]) fileData[key]=[]; let loaded=0; files.forEach(file => { const r=new FileReader(); r.onload=ev => { fileData[key].push({dataUrl:ev.target.result,name:file.name,mimeType:file.type,base64:ev.target.result.split(',')[1],isPdf:file.type==='application/pdf'}); loaded++; if(loaded===files.length){buildFields();updateSubmitBtn();} }; r.readAsDataURL(file); }); e.target.value=''; });
      const at2 = document.createElement('div'); at2.className='mini-drop-text'; at2.textContent='➕ 追加';
      am.appendChild(ai); am.appendChild(at2); body.appendChild(am);
    } else {
      const mini = document.createElement('div'); mini.className='mini-drop';
      const input = document.createElement('input'); input.type='file'; input.accept='image/*,application/pdf'; input.multiple=true;
      input.addEventListener('change', e => { const files=Array.from(e.target.files); if(!files.length) return; if(!fileData[key]) fileData[key]=[]; let loaded=0; files.forEach(file => { const r=new FileReader(); r.onload=ev => { fileData[key].push({dataUrl:ev.target.result,name:file.name,mimeType:file.type,base64:ev.target.result.split(',')[1],isPdf:file.type==='application/pdf'}); loaded++; if(loaded===files.length){ buildFields(); updateSubmitBtn(); const idx=DOC_KEYS.indexOf(key); const nk=DOC_KEYS.slice(idx+1).find(k=>!fileData[k]||!fileData[k].length); if(nk){const nr=fieldsList.querySelector('[data-key="'+nk+'"]');if(nr)nr.classList.add('open');} } }; r.readAsDataURL(file); }); e.target.value=''; });
      const dt = document.createElement('div'); dt.className='mini-drop-text'; dt.textContent=L.tapToAdd;
      const dh = document.createElement('div'); dh.className='mini-drop-hint'; dh.textContent=L.hint;
      mini.appendChild(input); mini.appendChild(dt); mini.appendChild(dh); body.appendChild(mini);
      if (!firstEmptyOpened) { row.classList.add('open'); firstEmptyOpened=true; }
    }
    row.appendChild(header); row.appendChild(body); fieldsList.appendChild(row);
  });
}
function updateSubmitBtn() {
  const L = LANGS[currentLang];
  submitBtn.textContent = L.btnSubmit;
  submitBtn.disabled = Object.keys(fileData).filter(k=>fileData[k]&&fileData[k].length>0).length===0;
}
function setLang(code) {
  if (!LANGS[code]) return;
  currentLang = code;
  const L = LANGS[code];
  langBar.querySelectorAll('.lang-btn').forEach((b,i) => { b.classList.toggle('active', LANG_ORDER[i]===code); });
  document.getElementById('ttlMain').textContent = L.title;
  let sub = L.subtitle;
  if (APP_TYPE) { const tl={'更新':'更新申請','変更':'変更申請','認定':'認定申請'}[APP_TYPE]||APP_TYPE; sub='【'+tl+'】\n'+sub; }
  if (SKIP_DOCS.length > 0) sub += '\n（不要書類を除いた書類のみ表示しています）';
  document.getElementById('ttlSub').textContent = sub;
  buildFields(); updateSubmitBtn();
}
setLang('ja');
document.getElementById('verBadge').textContent = VERSION;

submitBtn.addEventListener('click', async () => {
  const L = LANGS[currentLang];
  const keys = Object.keys(fileData).filter(k=>fileData[k]&&fileData[k].length>0);
  if (!keys.length) { alert(L.msgNoFile); return; }
  submitBtn.disabled=true; progressWrap.style.display='block'; progressBar.style.width='10%'; statusMsg.style.display='none';
  const timestamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const filesPayload = [];
  keys.forEach(key => {
    const arr = fileData[key]||[];
    const docLabel = LANGS['ja'].docs[key]||key;
    arr.forEach((d,i) => { const ext=d.name.split('.').pop()||'jpg'; const sfx=arr.length>1?'_'+(i+1):''; filesPayload.push({name:docLabel+sfx+'_'+timestamp+'.'+ext,mimeType:d.mimeType,data:d.base64}); });
  });
  try {
    progressBar.style.width='40%';
    const res = await fetch(GAS_URL,{method:'POST',redirect:'follow',body:JSON.stringify({files:filesPayload,folderId:FOLDER_ID})});
    progressBar.style.width='90%';
    let json={success:true};
    try { const text=await res.text(); if(text&&text.trim().startsWith('{')) json=JSON.parse(text); } catch(e){}
    if (json.success) {
      progressBar.style.width='100%';
      statusMsg.className='status-msg success'; statusMsg.textContent=L.msgSuccess; statusMsg.style.display='block';
      if (CASE_ID) {
        try {
          await fetch('https://ehwlgbwpycglmopiqyty.supabase.co/rest/v1/upload_notifications',{method:'POST',headers:{'Content-Type':'application/json','apikey':'sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u','Authorization':'Bearer sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u','Prefer':'return=minimal'},body:JSON.stringify({case_id:CASE_ID,folder_id:FOLDER_ID,file_count:filesPayload.length,file_names:filesPayload.map(f=>f.name).join(', ')})});
        } catch(e){ console.warn('通知保存失敗:',e); }
      }
      DOC_KEYS.forEach(k=>delete fileData[k]); buildFields(); updateSubmitBtn();
    } else { throw new Error(json.error||'error'); }
  } catch(err) {
    statusMsg.className='status-msg error'; statusMsg.textContent=L.msgError; statusMsg.style.display='block'; submitBtn.disabled=false;
  }
  setTimeout(()=>{progressWrap.style.display='none';progressBar.style.width='0%';},1200);
});
</script>
