<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>書類アップロード（所属機関）</title>
<style>
  :root {
    --primary: #1a56db;
    --primary-dark: #1341a8;
    --success: #057a55;
    --success-bg: #f0fdf4;
    --success-border: #bbf7d0;
    --error: #9b1c1c;
    --error-bg: #fef2f2;
    --error-border: #fecaca;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1a202c;
    --sub: #718096;
    --border: #e2e8f0;
    --hover: #eff6ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 20px 16px 60px;
  }
  .card {
    background: var(--card);
    border-radius: 20px;
    padding: 28px 20px;
    max-width: 480px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  .header { text-align: center; margin-bottom: 24px; }
  .office-name { font-size: 12px; color: var(--sub); margin-bottom: 8px; }
  .page-icon { font-size: 36px; margin-bottom: 8px; }
  h1 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .subtitle { font-size: 13px; color: var(--sub); line-height: 1.7; }
  .company-name-bar {
    background: #eff6ff;
    border: 1.5px solid #bfdbfe;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary);
    margin-bottom: 20px;
    text-align: center;
  }

  /* ─── タブ ─── */
  .tabs-wrap {
    display: flex;
    background: #eef2f7;
    border-radius: 14px;
    padding: 4px;
    margin-bottom: 20px;
    gap: 4px;
  }
  .tab-btn {
    flex: 1;
    padding: 11px 6px;
    font-size: 12px;
    font-weight: 700;
    line-height: 1.5;
    text-align: center;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--sub);
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab-btn.active {
    background: var(--card);
    color: var(--primary);
    box-shadow: 0 2px 8px rgba(26,86,219,0.12);
  }
  .tab-btn .tab-count {
    display: inline-block;
    background: var(--success);
    color: white;
    border-radius: 99px;
    font-size: 10px;
    padding: 1px 6px;
    margin-left: 3px;
    font-weight: 700;
    vertical-align: middle;
    line-height: 1.6;
  }
  .tab-btn .tab-count.hidden { display: none; }

  /* ─── パネル ─── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* 注意ボックス */
  .notice-box {
    font-size: 12px;
    color: #6b4f00;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 10px 13px;
    line-height: 1.8;
    margin-bottom: 16px;
  }
  .notice-box a { color: var(--primary); text-decoration: underline; }

  /* ─── フィールド ─── */
  .fields-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .field-row {
    border: 1.5px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .field-row.has-file { border-color: var(--primary); background: #eff6ff; }
  .field-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    cursor: pointer;
    user-select: none;
    gap: 8px;
  }
  .field-label { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
  .field-status { font-size: 12px; color: var(--sub); white-space: nowrap; }
  .field-status.ready { color: var(--success); font-weight: 600; }
  .chevron { font-size: 11px; color: var(--sub); transition: transform 0.2s; flex-shrink: 0; }
  .field-row.open .chevron { transform: rotate(180deg); }
  .field-body {
    border-top: 1.5px solid var(--border);
    padding: 12px 14px;
    display: none;
  }
  .field-row.open .field-body { display: block; }
  .field-row.has-file .field-body { border-top-color: var(--primary); }
  .file-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .file-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f8fafc;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    color: var(--text);
    gap: 6px;
  }
  .file-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-remove {
    background: none;
    border: none;
    color: #e53e3e;
    font-size: 15px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .add-btn-wrap { display: flex; gap: 8px; }
  .add-file-label {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: white;
    border: 1.5px dashed var(--border);
    border-radius: 10px;
    padding: 10px;
    font-size: 13px;
    color: var(--sub);
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .add-file-label:hover { background: var(--hover); border-color: var(--primary); color: var(--primary); }
  .hint { font-size: 11px; color: var(--sub); margin-top: 6px; text-align: center; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 12px;
  }
  .submit-btn:hover { background: var(--primary-dark); }
  .submit-btn:disabled { background: #a0aec0; cursor: not-allowed; }
  .progress-wrap {
    display: none;
    background: #e2e8f0;
    border-radius: 99px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .progress-bar {
    height: 100%;
    background: var(--primary);
    border-radius: 99px;
    transition: width 0.3s;
    width: 0%;
  }
  .status-msg {
    display: none;
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.6;
    white-space: pre-line;
    text-align: center;
  }
  .status-msg.success { background: var(--success-bg); border: 1.5px solid var(--success-border); color: var(--success); }
  .status-msg.error { background: var(--error-bg); border: 1.5px solid var(--error-border); color: var(--error); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="office-name">大房行政書士法人</div>
    <div class="page-icon">🏢</div>
    <h1>書類アップロード</h1>
    <div class="subtitle">所属機関の書類をアップロードしてください<br>（不要な項目はスキップできます）</div>
  </div>
  <div class="company-name-bar" id="companyNameBar" style="display:none;"></div>

  <!-- タブ -->
  <div class="tabs-wrap">
    <button class="tab-btn active" id="tabBtnLarge" onclick="switchTab('large')">
      💹 源泉徴収税額<br>1,000万円以上
      <span class="tab-count hidden" id="countLarge"></span>
    </button>
    <button class="tab-btn" id="tabBtnNormal" onclick="switchTab('normal')">
      🏭 それ以外の<br>企業様
      <span class="tab-count hidden" id="countNormal"></span>
    </button>
  </div>

  <!-- 大企業パネル -->
  <div class="tab-panel active" id="panelLarge">
    <div class="fields-list" id="fieldsListLarge"></div>
  </div>

  <!-- 通常パネル -->
  <div class="tab-panel" id="panelNormal">
    <div class="notice-box">
      ⚠️ 3年間継続した受入れ実績があり過去3年間債務超過なし、または
      <a href="https://www.moj.go.jp/isa/content/001378932.pdf" target="_blank">こちらの条件</a>
      に当てはまる企業様は<strong>事前にお申し出ください</strong>。
    </div>
    <div class="fields-list" id="fieldsListNormal"></div>
  </div>

  <button class="submit-btn" id="submitBtn" disabled>送信する</button>
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzqddeEti71WWCR9CanUR5zFf1ikUywHs-ES2CyqTucmaRfYaevz4yBqNHJx-_LIf3JCQ/exec';

// Supabase（アップロード通知用）
const SB_URL = 'https://ehwlgbwpycglmopiqyty.supabase.co';
const SB_KEY = 'sb_publishable_3ptyILIpGIcNA5sUBhFMbA_n0VxpY2u';

async function notifyUploadToSystem(fileCount, companyId, companyName) {
  // companyId・companyName両方なくてもとりあえず送る（テーブル存在確認も兼ねる）
  try {
    const payload = {
      file_count: fileCount,
      source: 'company_dataup',
      created_at: new Date().toISOString()
    };
    if (companyId) payload.company_id = companyId;
    if (companyName) payload.company_name = companyName;
    if (FOLDER_ID) payload.folder_id = FOLDER_ID;
    console.log('📤 Supabase通知送信:', payload);
    const res = await fetch(SB_URL + '/rest/v1/upload_notifications', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      console.log('✅ 案件管理システムに通知しました (HTTP ' + res.status + ')');
    } else {
      const errText = await res.text();
      console.error('❌ Supabase通知エラー (HTTP ' + res.status + '):', errText);
    }
  } catch(e) {
    console.error('❌ 通知送信例外:', e);
  }
}

const urlParams = new URLSearchParams(window.location.search);
const FOLDER_ID = urlParams.get('folder') || '';
const COMPANY_ID = urlParams.get('company') || '';
const COMPANY_NAME = urlParams.get('name') ? decodeURIComponent(urlParams.get('name')) : '';

if (COMPANY_NAME) {
  const bar = document.getElementById('companyNameBar');
  bar.textContent = '🏢 ' + COMPANY_NAME;
  bar.style.display = 'block';
}

// ─── 大企業（源泉1,000万円以上）の書類 ───
const LARGE_KEYS = ['shikiho', 'hoteichosho'];
const LARGE_DOCS = {
  shikiho:     '四季報の写し、または上場証明書類',
  hoteichosho: '法定調書合計表の写し',
};

// ─── 通常企業の書類 ───
const NORMAL_KEYS = [
  'kessan', 'tokibo', 'jumin_hyo', 'rodo_hoken', 'shakai_hoken',
  'zeimu_3', 'zeimu_shimin', 'shugyo_kisoku', 'chingin_kitei',
  'san_roku', 'henkei_rodo', 'nengkan_cal', 'madori', 'kyogikai', 'other',
];
const NORMAL_DOCS = {
  kessan:        '決算文書の写し3期分（損益計算書及び貸借対照表）',
  tokibo:        '登記事項証明書（履歴事項全部証明書）',
  jumin_hyo:     '役員（最低1名分）の住民票の写し',
  rodo_hoken:    '労働保険料等納付証明書（未納なし証明）',
  shakai_hoken:  '社会保険料納入状況照会回答票',
  zeimu_3:       '納税証明書（その３）＊税務署発行',
  zeimu_shimin:  '納税証明書（法人住民税）＊市町村発行',
  shugyo_kisoku: '就業規則',
  chingin_kitei: '賃金規定',
  san_roku:      '36協定届出書',
  henkei_rodo:   '変形労働届出書',
  nengkan_cal:   '年間カレンダー',
  madori:        '予定物件の間取り図、物件資料など',
  kyogikai:      '協議会加入証明書',
  other:         'その他',
};

const fileData = {};

// ─── タブ切り替え ───
function switchTab(tab) {
  ['large', 'normal'].forEach(t => {
    document.getElementById('panelLarge'.replace('large', t === 'large' ? 'Large' : 'Normal')).classList.toggle('active', t === tab);
    document.getElementById('tabBtn' + (t === 'large' ? 'Large' : 'Normal')).classList.toggle('active', t === tab);
  });
  document.getElementById('panelLarge').classList.toggle('active', tab === 'large');
  document.getElementById('panelNormal').classList.toggle('active', tab === 'normal');
  document.getElementById('tabBtnLarge').classList.toggle('active', tab === 'large');
  document.getElementById('tabBtnNormal').classList.toggle('active', tab === 'normal');
}

// ─── フィールド行を生成 ───
function buildFieldRow(key, docsMap) {
  const arr = fileData[key] || [];
  const hasFile = arr.length > 0;
  const row = document.createElement('div');
  row.className = 'field-row' + (hasFile ? ' has-file' : '');
  row.dataset.key = key;

  const header = document.createElement('div');
  header.className = 'field-header';
  header.innerHTML = `
    <span class="field-label">${docsMap[key]}</span>
    <span class="field-status${hasFile ? ' ready' : ''}">${hasFile ? arr.length + '件選択済み ✓' : '未選択'}</span>
    <span class="chevron">▼</span>
  `;
  header.onclick = () => row.classList.toggle('open');

  const body = document.createElement('div');
  body.className = 'field-body';

  const fileListEl = document.createElement('div');
  fileListEl.className = 'file-list';
  renderFileList(key, fileListEl);
  body.appendChild(fileListEl);

  const addWrap = document.createElement('div');
  addWrap.className = 'add-btn-wrap';
  const label = document.createElement('label');
  label.className = 'add-file-label';
  label.innerHTML = '📷 ファイルを追加';
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*,application/pdf';
  input.multiple = true;
  input.style.display = 'none';
  input.onchange = async (e) => {
    const files = Array.from(e.target.files);
    for (const file of files) {
      const b64 = await toBase64(file);
      if (!fileData[key]) fileData[key] = [];
      fileData[key].push({ name: file.name, mimeType: file.type || 'application/octet-stream', base64: b64 });
    }
    input.value = '';
    buildAllFields();
    updateSubmitBtn();
  };
  label.appendChild(input);
  addWrap.appendChild(label);
  body.appendChild(addWrap);
  const hint = document.createElement('div');
  hint.className = 'hint';
  hint.textContent = 'JPG / PNG / PDF';
  body.appendChild(hint);

  row.appendChild(header);
  row.appendChild(body);
  if (hasFile) row.classList.add('open');
  return row;
}

function renderFileList(key, container) {
  container.innerHTML = '';
  const arr = fileData[key] || [];
  arr.forEach((d, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<span class="file-item-name">📄 ${d.name}</span><button class="file-remove" title="削除">✕</button>`;
    item.querySelector('.file-remove').onclick = () => {
      fileData[key].splice(i, 1);
      buildAllFields();
      updateSubmitBtn();
    };
    container.appendChild(item);
  });
}

function buildAllFields() {
  // 大企業タブ
  const listLarge = document.getElementById('fieldsListLarge');
  listLarge.innerHTML = '';
  LARGE_KEYS.forEach(key => listLarge.appendChild(buildFieldRow(key, LARGE_DOCS)));

  // 通常タブ
  const listNormal = document.getElementById('fieldsListNormal');
  listNormal.innerHTML = '';
  NORMAL_KEYS.forEach(key => listNormal.appendChild(buildFieldRow(key, NORMAL_DOCS)));

  // タブバッジ更新
  const cntL = LARGE_KEYS.filter(k => fileData[k] && fileData[k].length > 0).length;
  const cntN = NORMAL_KEYS.filter(k => fileData[k] && fileData[k].length > 0).length;
  const el = document.getElementById('countLarge');
  const en = document.getElementById('countNormal');
  el.textContent = cntL; el.className = 'tab-count' + (cntL > 0 ? '' : ' hidden');
  en.textContent = cntN; en.className = 'tab-count' + (cntN > 0 ? '' : ' hidden');
}

function updateSubmitBtn() {
  const allKeys = [...LARGE_KEYS, ...NORMAL_KEYS];
  const hasAny = allKeys.some(k => fileData[k] && fileData[k].length > 0);
  document.getElementById('submitBtn').disabled = !hasAny;
}

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(',')[1]);
    r.onerror = () => reject(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

buildAllFields();

document.getElementById('submitBtn').addEventListener('click', async () => {
  const allKeys = [...LARGE_KEYS, ...NORMAL_KEYS];
  const allDocs = { ...LARGE_DOCS, ...NORMAL_DOCS };
  const hasAny = allKeys.some(k => fileData[k] && fileData[k].length > 0);
  if (!hasAny) { alert('少なくとも1つのファイルを選択してください'); return; }

  const submitBtn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  const progressWrap = document.getElementById('progressWrap');
  const progressBar = document.getElementById('progressBar');

  submitBtn.disabled = true;
  statusMsg.style.display = 'none';
  progressWrap.style.display = 'block';
  progressBar.style.width = '10%';

  const timestamp = Date.now();
  const filesPayload = [];
  allKeys.forEach(key => {
    const arr = fileData[key] || [];
    arr.forEach((d, i) => {
      const ext = d.name.split('.').pop() || 'jpg';
      const suffix = arr.length > 1 ? '_' + (i + 1) : '';
      filesPayload.push({
        name: allDocs[key] + suffix + '_' + timestamp + '.' + ext,
        mimeType: d.mimeType,
        data: d.base64,
      });
    });
  });

  try {
    progressBar.style.width = '40%';
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ files: filesPayload, folderId: FOLDER_ID }),
    });
    progressBar.style.width = '90%';
    const json = await res.json();
    if (json.success) {
      progressBar.style.width = '100%';
      statusMsg.className = 'status-msg success';
      statusMsg.textContent = '✅ アップロード完了しました！\n担当者に届きました。';
      statusMsg.style.display = 'block';
      // 案件管理システムにアップロード通知
      notifyUploadToSystem(filesPayload.length, COMPANY_ID, COMPANY_NAME);
      allKeys.forEach(k => delete fileData[k]);
      buildAllFields();
      updateSubmitBtn();
    } else {
      throw new Error(json.error || 'error');
    }
  } catch (err) {
    statusMsg.className = 'status-msg error';
    statusMsg.textContent = '❌ 送信に失敗しました。\nもう一度お試しください。';
    statusMsg.style.display = 'block';
    submitBtn.disabled = false;
  }

  setTimeout(() => {
    progressWrap.style.display = 'none';
    progressBar.style.width = '0%';
  }, 1200);
});
</script>
</body>
</html>
